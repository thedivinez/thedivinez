{%extends "layout.html"%}
{%block content %}
{%for message in data%}
<!-- ====== Start Message ======  -->
<div style="padding: 20px">
  <b style="color: rgb(15, 68, 138);">{{message.name}}</b>
  <p> <small class="col-lg-10">{{message.message}}<span><b> ~ contact : {{message.email}}</b></span></small> </p>
  <div style="padding-right: 15px;">
    <small class="pull-right time"><i class="fa fa-calendar"></i> {{message.date}}</small><br><small
      class="pull-right time"><i class="fa fa-clock-o"></i> {{message.time}}</small>
  </div>
  <div style="padding: 20px; box-shadow: 0px 2px 8px rgba(0, 0, 0, .25);"></div>
</div>
<!-- ====== End Message ======  -->
{%endfor%}
{%endblock%}
